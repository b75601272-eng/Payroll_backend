# render.yaml — Render.com auto-deploy config for BACKEND
# Place this file in the backend/ folder root

services:
  - type: web
    name: payroll-backend
    env: node
    region: singapore   # closest to India
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Set these in Render dashboard → Environment tab:
      # DB_HOST, DB_USER, DB_PASSWORD, DB_NAME, FRONTEND_URL
